<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>算数・数学トレーニング</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./style.css" />
  <link rel="icon" href="favicon.png" type="image/png">
  <meta name="theme-color" content="#0b57d0" />
</head>
<body>
  <header class="app-header">
    <div class="app-title">算数・数学トレーニング</div>
    <div class="app-sub">級×カテゴリで大問ランダム出題（小問は順序固定）</div>
  </header>

  <main class="container">
    <!-- 設定画面 -->
    <section id="screen-setup" class="card">
      <h1>出題設定</h1>

      <label class="field">
        <span>級</span>
        <select id="levelSelect"></select>
      </label>

      <label class="field">
        <span>カテゴリ</span>
        <select id="topicSelect"></select>
      </label>

      <label class="field">
        <span>出題数（大問数）</span>
        <select id="countSelect">
          <option value="1">1問</option>
          <option value="2">2問</option>
          <option value="3" selected>3問</option>
          <option value="5">5問</option>
        </select>
      </label>

      <div class="row">
        <button id="startBtn" class="btn primary">開始</button>
        <button id="resetHistoryBtn" class="btn">履歴リセット</button>
      </div>
      
      <button id="precacheBtn" type="button">オフライン準備（ダウンロード）</button>
      <div id="precacheStatus" style="margin-top:8px;font-size:14px;"></div>

      <div id="historyBox" class="hint"></div>
    </section>

    <!-- 問題画面 -->
    <section id="screen-quiz" class="card hidden">
      <div class="quiz-top">
        <div id="progressText" class="progress"></div>
        <div id="scoreText" class="score"></div>
      </div>

      <div id="qMeta" class="meta"></div>

      <!-- 大問リード文（条件）を常時表示 -->
      <div id="majorIntro" class="major-intro hidden"></div>

      <div id="qPrompt" class="prompt"></div>

      <div id="qImageWrap" class="image-wrap hidden">
        <img id="qImage" alt="問題図" />
      </div>

      <div id="answerArea" class="answer-area"></div>

      <div id="judgeArea" class="judge-area hidden"></div>

      <div class="row">
        <button id="checkBtn" class="btn primary">採点</button>
        <button id="nextBtn" class="btn hidden">次へ</button>
        <button id="quitBtn" class="btn">中断</button>
      </div>
    </section>

    <!-- 結果画面 -->
    <section id="screen-result" class="card hidden">
      <h1>結果</h1>
      <div id="resultSummary" class="result"></div>

      <div class="row">
        <button id="reviewBtn" class="btn primary hidden">まちがい復習</button>
        <button id="backToSetupBtn" class="btn">設定に戻る</button>
      </div>

      <pre id="resultDetails" class="details"></pre>
    </section>
  </main>

  <footer class="footer">
    <span id="pwaStatus"></span>
  </footer>

  <script src="./utils.js"></script>
  <script src="./questionTypes.js"></script>
  <script src="./render.js"></script>
  <script src="./grade.js"></script>
  <script src="./app.js"></script>
</body>
</html>
